services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DATABASE}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: .
    env_file:
      - .env
    ports:
      - "127.0.0.1:8500:8000"
    depends_on:
      - postgres
    restart: unless-stopped
    volumes:
      - ./src/static:/app/src/static


volumes:
  postgres_data:
